<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">Six destination concepts for the Crew Quarters view</title>
  <desc id="desc">A grid of six destination mood panels: Jovian Dawn, Ringed Giant, Aurora World, Binary Eclipse, Nebula Drift, and Deep Quiet.</desc>
  <defs>
    <linearGradient id="jov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ead7ad"/>
      <stop offset="0.45" stop-color="#c08b5f"/>
      <stop offset="0.72" stop-color="#a85b50"/>
      <stop offset="1" stop-color="#654236"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcc9a6"/>
      <stop offset="0.55" stop-color="#bfa982"/>
      <stop offset="1" stop-color="#7e6a4e"/>
    </linearGradient>
    <radialGradient id="aurora" cx="50%" cy="38%" r="75%">
      <stop offset="0" stop-color="#2e526e"/>
      <stop offset="0.72" stop-color="#132d42"/>
      <stop offset="1" stop-color="#07121f"/>
    </radialGradient>
    <radialGradient id="nebula" cx="38%" cy="34%" r="80%">
      <stop offset="0" stop-color="#54326e"/>
      <stop offset="0.56" stop-color="#1f314d"/>
      <stop offset="1" stop-color="#070c16"/>
    </radialGradient>
  </defs>
  <rect width="960" height="500" fill="#16171a"/>
  <text x="480" y="32" fill="#e8e4dc" font-family="-apple-system, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">SIX SIGNATURE SCENES - ONE VIEW ENGINE, MANY MOODS</text>

  <g font-family="-apple-system, Segoe UI, Arial, sans-serif">
    <g transform="translate(36 62)">
      <rect width="276" height="156" rx="10" fill="#070c18" stroke="#33363c"/>
      <clipPath id="c1"><rect width="276" height="156" rx="10"/></clipPath>
      <g clip-path="url(#c1)">
        <circle cx="198" cy="186" r="132" fill="url(#jov)"/>
        <ellipse cx="166" cy="96" rx="20" ry="11" fill="#a85b50"/>
        <path d="M40 126 A180 30 0 0 0 332 126" fill="none" stroke="#e7d6b8" stroke-width="8" stroke-opacity=".65"/>
        <circle cx="55" cy="44" r="1.5" fill="#fff"/>
        <circle cx="112" cy="36" r="1.2" fill="#fff"/>
        <circle cx="244" cy="42" r="1.4" fill="#fff"/>
      </g>
      <text x="14" y="184" fill="#e8e4dc" font-size="16" font-weight="700">Jovian Dawn</text>
      <text x="14" y="204" fill="#9a958a" font-size="13">banded giant - warm - majestic</text>
    </g>

    <g transform="translate(342 62)">
      <rect width="276" height="156" rx="10" fill="#060b16" stroke="#33363c"/>
      <clipPath id="c2"><rect width="276" height="156" rx="10"/></clipPath>
      <g clip-path="url(#c2)">
        <circle cx="138" cy="118" r="76" fill="url(#ring)"/>
        <ellipse cx="138" cy="78" rx="184" ry="21" fill="none" stroke="#d9c8a6" stroke-width="12" stroke-opacity=".58"/>
        <ellipse cx="138" cy="78" rx="184" ry="21" fill="none" stroke="#806b4f" stroke-width="4" stroke-opacity=".45"/>
        <path d="M62 118 A184 21 0 0 0 214 118" fill="none" stroke="#2b2217" stroke-width="5" stroke-opacity=".45"/>
        <circle cx="38" cy="42" r="1.4" fill="#fff"/>
        <circle cx="238" cy="38" r="1.5" fill="#fff"/>
      </g>
      <text x="14" y="184" fill="#e8e4dc" font-size="16" font-weight="700">The Ringed Giant</text>
      <text x="14" y="204" fill="#9a958a" font-size="13">rings edge-on - cool - serene</text>
    </g>

    <g transform="translate(648 62)">
      <rect width="276" height="156" rx="10" fill="url(#aurora)" stroke="#33363c"/>
      <clipPath id="c3"><rect width="276" height="156" rx="10"/></clipPath>
      <g clip-path="url(#c3)">
        <circle cx="138" cy="190" r="136" fill="#0e2535"/>
        <path d="M10 122 Q80 72 136 102 T270 82" fill="none" stroke="#62e2b0" stroke-width="10" stroke-opacity=".58"/>
        <path d="M10 138 Q86 94 136 116 T272 102" fill="none" stroke="#897cf0" stroke-width="7" stroke-opacity=".48"/>
        <circle cx="40" cy="44" r="1.3" fill="#fff"/>
        <circle cx="214" cy="38" r="1.4" fill="#fff"/>
      </g>
      <text x="14" y="184" fill="#e8e4dc" font-size="16" font-weight="700">Aurora World</text>
      <text x="14" y="204" fill="#9a958a" font-size="13">alien night - green violet - dreamlike</text>
    </g>

    <g transform="translate(36 276)">
      <rect width="276" height="156" rx="10" fill="#05070f" stroke="#33363c"/>
      <clipPath id="c4"><rect width="276" height="156" rx="10"/></clipPath>
      <g clip-path="url(#c4)">
        <circle cx="132" cy="80" r="54" fill="#ffdca0"/>
        <circle cx="132" cy="80" r="70" fill="none" stroke="#ffb35c" stroke-width="12" stroke-opacity=".25"/>
        <circle cx="166" cy="66" r="48" fill="#090d16"/>
        <circle cx="238" cy="44" r="12" fill="#ffb867"/>
        <circle cx="44" cy="44" r="1.4" fill="#fff"/>
        <circle cx="222" cy="132" r="1.2" fill="#fff"/>
      </g>
      <text x="14" y="184" fill="#e8e4dc" font-size="16" font-weight="700">Binary Eclipse</text>
      <text x="14" y="204" fill="#9a958a" font-size="13">two suns - corona flare - dramatic</text>
    </g>

    <g transform="translate(342 276)">
      <rect width="276" height="156" rx="10" fill="url(#nebula)" stroke="#33363c"/>
      <ellipse cx="116" cy="70" rx="94" ry="64" fill="#67438a" opacity=".36"/>
      <ellipse cx="184" cy="114" rx="76" ry="54" fill="#2b7280" opacity=".34"/>
      <g fill="#fff">
        <circle cx="52" cy="50" r="1.5"/>
        <circle cx="210" cy="48" r="1.4"/>
        <circle cx="138" cy="90" r="1.6"/>
        <circle cx="178" cy="76" r="1.2"/>
        <circle cx="76" cy="126" r="1.1"/>
      </g>
      <text x="14" y="184" fill="#e8e4dc" font-size="16" font-weight="700">Nebula Drift</text>
      <text x="14" y="204" fill="#9a958a" font-size="13">inside the cloud - glowing - mysterious</text>
    </g>

    <g transform="translate(648 276)">
      <rect width="276" height="156" rx="10" fill="#04060e" stroke="#33363c"/>
      <path d="M0 92 Q138 50 276 92 L276 116 Q138 76 0 116 Z" fill="#26344f" opacity=".55"/>
      <g fill="#fff">
        <circle cx="40" cy="44" r="1.5"/>
        <circle cx="88" cy="92" r="1.1"/>
        <circle cx="158" cy="56" r="1.5"/>
        <circle cx="218" cy="102" r="1.2"/>
        <circle cx="110" cy="128" r="1.0"/>
        <circle cx="242" cy="48" r="1.3"/>
      </g>
      <text x="14" y="184" fill="#e8e4dc" font-size="16" font-weight="700">Deep Quiet</text>
      <text x="14" y="204" fill="#9a958a" font-size="13">Milky Way band - still - meditative</text>
    </g>
  </g>
</svg>
